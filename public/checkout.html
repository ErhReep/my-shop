<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title data-i18n="checkout_title">Checkout</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="header-container"></div>

<h1 data-i18n="checkout_title">Checkout</h1>

<div id="cart"></div>

<h2>
  <span data-i18n="cart_total">Total:</span>
  <span id="summary">0 $</span>
</h2>

<form id="checkoutForm" class="checkout-form">

  <input 
    id="name"
    type="text"
    data-i18n-placeholder="name_placeholder"
    placeholder="Name"
    required
  >

  <input 
    id="company"
    type="text"
    data-i18n-placeholder="company_placeholder"
    placeholder="Company"
  >

  <input 
    id="phone"
    type="text"
    data-i18n-placeholder="phone_placeholder"
    placeholder="Phone"
    required
  >

  <input 
    id="email"
    type="email"
    data-i18n-placeholder="email_placeholder"
    placeholder="Email"
    required
  >

  <input 
    id="address"
    type="text"
    data-i18n-placeholder="address_placeholder"
    placeholder="Address"
    required
  >

  <textarea 
    id="comment"
    data-i18n-placeholder="comment_placeholder"
    placeholder="Comment"
  ></textarea>

  <button 
    type="submit"
    class="checkout-btn"
    data-i18n="confirm_order_button"
  >
    Confirm Order
  </button>

</form>

<script src="/js/checkout.js"></script>
<script src="/js/languages.js"></script>
<script src="/js/header.js"></script>

</body>
</html>
