<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Редактировать товар</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="header-container"></div>

<div class="admin-edit-container">
  <h2>Редактирование товара</h2>

  <div class="edit-card">

    <div class="edit-image">
      <img id="previewImage" src="" alt="Preview">
    </div>

    <div class="edit-fields">

      <label>Название</label>
      <input type="text" id="name">

      <label>Описание</label>
      <textarea id="description"></textarea>

      <label>Цена</label>
      <input type="number" id="price" min="0">

      <label>Склад</label>
      <input type="number" id="stock" min="0">

      <label>Категория</label>
      <select id="category">
        <option value="tables">Столы</option>
        <option value="chairs">Стулья</option>
      </select>

      <label>Новое изображение</label>
      <input type="file" id="image">

      <div class="edit-actions">
        <button onclick="updateProduct()">Сохранить</button>
        <button class="btn-delete" onclick="goBack()">Назад</button>
      </div>

    </div>
  </div>
</div>

<script src="/js/admin-edit-product.js"></script>
<script src="/js/languages.js"></script>
<script src="/js/header.js"></script>


</body>
</html>
