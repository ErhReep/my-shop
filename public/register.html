<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title data-i18n="register_title">Register</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="header-container"></div>

<h2 data-i18n="register_title">Register</h2>

<input 
  type="email" 
  id="email" 
  data-i18n-placeholder="email_placeholder" 
  placeholder="Email"
><br><br>

<input 
  type="password" 
  id="password" 
  data-i18n-placeholder="password_placeholder" 
  placeholder="Password"
><br><br>

<button onclick="register()" data-i18n="register_button">Register</button>

<script>
async function register() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch("/api/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (!res.ok) {
    alert(window.t?.register_error || data.message || "Registration error");
    return;
  }

  alert(window.t?.register_success || "Registration successful");
  window.location.href = "login.html";
}
</script>

<script src="/js/languages.js"></script>
<script src="/js/header.js"></script>

</body>
</html>
