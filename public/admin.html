<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title data-i18n="admin_panel">Админ панель</title>
  <link rel="stylesheet" href="css/style.css">

  <style>
    .admin-tabs {
      display: flex;
      gap: 10px;
      margin: 20px 0;
    }
    .admin-tabs button {
      padding: 10px 15px;
      cursor: pointer;
    }
    .tab { display: none; }
    .tab.active { display: block; }
  </style>
</head>
<body>

<div id="header-container"></div>

<h2 style="text-align:center;" data-i18n="admin_panel">Админ панель</h2>

<div class="admin-tabs" style="justify-content:center;">
  <button onclick="openTab('add')" data-i18n="add_product_tab">➕ Добавить товар</button>
  <button onclick="openTab('products')" data-i18n="all_products_tab">📦 Все товары</button>
  <button onclick="openTab('orders')" data-i18n="orders_tab">🧾 Заказы</button>
</div>

<div id="tab-add" class="tab active" style="text-align:center;">

  <input type="text" id="name" data-i18n-placeholder="product_name" placeholder="Название"><br><br>
  <input type="text" id="description" data-i18n-placeholder="product_description" placeholder="Описание"><br><br>
  <input type="number" id="price" data-i18n-placeholder="price" placeholder="Цена"><br><br>
  <input type="number" id="stock" data-i18n-placeholder="stock" placeholder="Количество на складе" min="0"><br><br>

  <select id="category">
    <option value="tables" data-i18n="tables">Столы</option>
    <option value="chairs" data-i18n="chairs">Стулья</option>
  </select><br><br>

  <input type="file" id="image"><br><br>

  <button onclick="addProduct()" data-i18n="add_product_button">Добавить товар</button>
</div>

<div id="tab-products" class="tab">
  <iframe src="/admin-products.html" width="100%" height="700" style="border:none;"></iframe>
</div>

<div id="tab-orders" class="tab">
  <iframe src="/admin-orders.html" width="100%" height="700" style="border:none;"></iframe>
</div>

<script>
const token = localStorage.getItem("token");
const user = JSON.parse(localStorage.getItem("user"));

if (!token || !user || user.role !== "admin") {
  alert(window.t?.no_access || "Нет доступа");
  location.href = "/login.html";
}

function openTab(name) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById("tab-" + name).classList.add("active");
}

async function addProduct() {

  const formData = new FormData();

  const name = document.getElementById("name").value.trim();
  const description = document.getElementById("description").value.trim();
  const price = document.getElementById("price").value;
  const stock = document.getElementById("stock").value;
  const category = document.getElementById("category").value;

  if (!name || !description || !price || stock === "") {
    alert(window.t?.fill_all_fields || "Заполните все поля");
    return;
  }

  formData.append("name", name);
  formData.append("description", description);
  formData.append("price", price);
  formData.append("stock", stock);
  formData.append("category", category);

  const imageFile = document.getElementById("image").files[0];
  if (imageFile) formData.append("image", imageFile);

  try {
    const res = await fetch("/api/products", {
      method: "POST",
      headers: { Authorization: "Bearer " + token },
      body: formData
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.message || window.t?.error || "Ошибка");
      return;
    }

    alert(window.t?.product_added || "Товар добавлен");

    document.getElementById("name").value = "";
    document.getElementById("description").value = "";
    document.getElementById("price").value = "";
    document.getElementById("stock").value = "";
    document.getElementById("image").value = "";

  } catch (err) {
    console.error(err);
    alert(window.t?.server_error || "Ошибка сервера");
  }
}
</script>

<script src="/js/languages.js"></script>
<script src="/js/header.js"></script>

</body>
</html>
